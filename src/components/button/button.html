<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Button | 93 Design System</title>

    <link rel="stylesheet" href="../../../dist/93.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Blinker:wght@100;200;300;400;600;700;800;900&display=swap" rel="stylesheet">
  </head>

  <body>
    <ds-grid gap="xl" columns="1">
      <ds-col gap="base">
        <ds-row gap="base">
          <button
          class="ds-button"
          variant="primary"
          size="sm">
          <ds-icon name="heart" size="sm"></ds-icon>
          primary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="secondary"
          size="sm">
          <ds-icon name="heart" size="sm"></ds-icon>
          secondary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="tertiary"
          size="sm">
          <ds-icon name="heart" size="sm"></ds-icon>
          tertiary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>
        </ds-row>

        <ds-row gap="base">
          <button
          class="ds-button"
          variant="primary"
          size="sm"
          disabled>
          <ds-icon name="heart" size="sm"></ds-icon>
          primary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="secondary"
          size="sm"
          disabled>
          <ds-icon name="heart" size="sm"></ds-icon>
          secondary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="tertiary"
          size="sm"
          disabled>
          <ds-icon name="heart" size="sm"></ds-icon>
          tertiary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>
        </ds-row>
      </ds-col>

      <ds-col gap="base">
        <ds-row gap="base">
          <button
          class="ds-button"
          variant="primary"
          size="base">
          <ds-icon name="heart" size="sm"></ds-icon>
          primary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="secondary"
          size="base">
          <ds-icon name="heart" size="sm"></ds-icon>
          secondary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="tertiary"
          size="base">
          <ds-icon name="heart" size="sm"></ds-icon>
          tertiary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>
        </ds-row>

        <ds-row gap="base">
          <button
          class="ds-button"
          variant="primary"
          size="base"
          disabled>
          <ds-icon name="heart" size="sm"></ds-icon>
          primary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="secondary"
          size="base"
          disabled>
          <ds-icon name="heart" size="sm"></ds-icon>
          secondary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="tertiary"
          size="base"
          disabled>
          <ds-icon name="heart" size="sm"></ds-icon>
          tertiary button
          <ds-icon name="heart" size="sm"></ds-icon>
          </button>
        </ds-row>
      </ds-col>

      <ds-col gap="base">
        <ds-row gap="base">
          <button
          class="ds-button"
          variant="primary"
          size="lg">
          <ds-icon name="heart" size="base"></ds-icon>
          primary button
          <ds-icon name="heart" size="base"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="secondary"
          size="lg">
          <ds-icon name="heart" size="base"></ds-icon>
          secondary button
          <ds-icon name="heart" size="base"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="tertiary"
          size="lg">
          <ds-icon name="heart" size="base"></ds-icon>
          tertiary button
          <ds-icon name="heart" size="base"></ds-icon>
          </button>
        </ds-row>

        <ds-row gap="base">
          <button
          class="ds-button"
          variant="primary"
          size="lg"
          disabled>
          <ds-icon name="heart" size="base"></ds-icon>
          primary button
          <ds-icon name="heart" size="base"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="secondary"
          size="lg"
          disabled>
          <ds-icon name="heart" size="base"></ds-icon>
          secondary button
          <ds-icon name="heart" size="base"></ds-icon>
          </button>

          <button
          class="ds-button"
          variant="tertiary"
          size="lg"
          disabled>
          <ds-icon name="heart" size="base"></ds-icon>
          tertiary button
          <ds-icon name="heart" size="base"></ds-icon>
          </button>
        </ds-row>
      </ds-col>
    </ds-col>

    <script type="module" src="../components.js"></script>
  </body>
</html>
